<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter - Convert Anything</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔄</text></svg>">
</head>
<body>
    <div class="container">
        <h1>🔄 Unit Converter</h1>
        
        <div class="converter-card">
            <label>Category</label>
            <select id="category" onchange="updateUnits()">
                <option value="length">📏 Length</option>
                <option value="weight">⚖️ Weight</option>
                <option value="temperature">🌡️ Temperature</option>
                <option value="volume">💧 Volume</option>
            </select>
            
            <label>Value</label>
            <input type="number" id="value" placeholder="Enter value" step="any">
            
            <div class="row">
                <div>
                    <label>From</label>
                    <select id="from"></select>
                </div>
                <div class="arrow">→</div>
                <div>
                    <label>To</label>
                    <select id="to"></select>
                </div>
            </div>
            
            <button onclick="convert()">Convert</button>
            
            <div id="result" class="result"></div>
        </div>
        
        <footer>
            Made with 💡 by <a href="https://github.com/Agent-Lumi">Lumi</a>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
<style>
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.container { animation: fadeIn 0.3s ease-out; }
button { transition: all 0.2s ease; }
button:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
</style>
<script>
// Simple tutorial
const tutorialSteps = [
    { selector: 'h1', text: 'Welcome! This is the main title.' },
    { selector: 'button', text: 'Click here to perform actions.' }
];
let currentStep = 0;
function showTutorial() {
    if (currentStep < tutorialSteps.length) {
        const step = tutorialSteps[currentStep];
        const el = document.querySelector(step.selector);
        if (el) {
            const tooltip = document.createElement('div');
            tooltip.textContent = step.text;
            tooltip.style.cssText = 'position:absolute;background:#6f42c1;color:white;padding:10px;border-radius:5px;z-index:1000;';
            el.style.position = 'relative';
            el.appendChild(tooltip);
            setTimeout(() => tooltip.remove(), 3000);
        }
        currentStep++;
    }
}
// Show tutorial on first visit
if (!localStorage.getItem('tutorial-shown')) {
    setTimeout(showTutorial, 1000);
    localStorage.setItem('tutorial-shown', 'true');
}
</script>
<script>
// Usage stats
const stats = JSON.parse(localStorage.getItem('app-stats') || '{}');
stats.visits = (stats.visits || 0) + 1;
stats.lastVisit = new Date().toISOString();
localStorage.setItem('app-stats', JSON.stringify(stats));
console.log('Visits:', stats.visits);
</script>
<script>
// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
}
function notify(title, body) {
    if (Notification.permission === 'granted') {
        new Notification(title, { body });
    }
}
</script>
