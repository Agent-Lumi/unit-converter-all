<body>
    <div class="container">
        <h1>🔄 Unit Converter</h1>
        
        <div class="converter-card">
            <label>Category</label>
            <select id="category" onchange="updateUnits()">
                <option value="length">📏 Length</option>
                <option value="weight">⚖️ Weight</option>
                <option value="temperature">🌡️ Temperature</option>
                <option value="volume">💧 Volume</option>
            </select>
            
            <label>Value</label>
            <input type="number" id="value" placeholder="Enter value" step="any">
            
            <div class="row">
                <div>
                    <label>From</label>
                    <select id="from"></select>
                </div>
                <div class="arrow">→</div>
                <div>
                    <label>To</label>
                    <select id="to"></select>
                </div>
            </div>
            
            <button onclick="convert()">Convert</button>
            
            <div id="result" class="result"></div>
        </div>
        
        <footer>
            Made with 💡 by <a href="https://github.com/Agent-Lumi">Lumi</a>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>

<script>
// Simple tutorial
const tutorialSteps = [
    { selector: 'h1', text: 'Welcome! This is the main title.' },
    { selector: 'button', text: 'Click here to perform actions.' }
];
let currentStep = 0;
function showTutorial() {
    if (currentStep < tutorialSteps.length) {
        const step = tutorialSteps[currentStep];
        const el = document.querySelector(step.selector);
        if (el) {
            const tooltip = document.createElement('div');
            tooltip.textContent = step.text;
            tooltip.style.cssText = 'position:absolute;background:#6f42c1;color:white;padding:10px;border-radius:5px;z-index:1000;';
            el.style.position = 'relative';
            el.appendChild(tooltip);
            setTimeout(() => tooltip.remove(), 3000);
        }
        currentStep++;
    }
}
// Show tutorial on first visit
if (!localStorage.getItem('tutorial-shown')) {
    setTimeout(showTutorial, 1000);
    localStorage.setItem('tutorial-shown', 'true');
}
</script>

<script>
// Auto-save to localStorage
const saveKey = 'app-data-' + location.pathname;
const saveData = () => {
    const data = { timestamp: Date.now(), inputs: {} };
    document.querySelectorAll('input, textarea').forEach(el => {
        data.inputs[el.id || el.name] = el.value;
    });
    localStorage.setItem(saveKey, JSON.stringify(data));
};
const loadData = () => {
    const saved = localStorage.getItem(saveKey);
    if (saved) {
        const data = JSON.parse(saved);
        Object.entries(data.inputs).forEach(([key, value]) => {
            const el = document.getElementById(key) || document.querySelector('[name="' + key + '"]');
            if (el) el.value = value;
        });
    }
};
document.addEventListener('input', saveData);
document.addEventListener('DOMContentLoaded', loadData);
</script>

<script>
// Undo/Redo history
const history = { past: [], future: [] };
const saveState = () => {
    const state = document.querySelector('textarea, input')?.value;
    if (state) history.past.push(state);
};
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        if (e.shiftKey && history.future.length) {
            // Redo
            const state = history.future.pop();
            history.past.push(document.querySelector('textarea, input')?.value);
            if (document.querySelector('textarea, input')) document.querySelector('textarea, input').value = state;
        } else if (history.past.length) {
            // Undo
            const state = history.past.pop();
            history.future.push(document.querySelector('textarea, input')?.value);
            if (document.querySelector('textarea, input')) document.querySelector('textarea, input').value = state;
        }
    }
});
document.addEventListener('input', saveState);
</script>

});

<script>
// Export functionality
function exportData(format) {
    const data = document.querySelector('textarea, input')?.value || document.body.innerText;
    const blob = new Blob([data], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'export.' + format;
    a.click();
    URL.revokeObjectURL(url);
}
</script>
